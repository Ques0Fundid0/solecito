<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background-image:url("https://i.pinimg.com/originals/89/8a/14/898a14d06c6c0bf27b8ceaf749cecb4c.gif");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    font-family: Arial, Helvetica, sans-serif;
}

#mensaje{
    color:red;
    font-size:3rem;
    max-width:800px;
    padding:30px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div id="mensaje"></div>

<script>
const mensajes = [
"Tienes los ojitos más bellos que he visto",
"Por ti compartiría mis nuggets de dinosaurio",
"Siento que me haces ser mejor persona",
"Me encanta escuchar tu voz para quedarme dormida",
"Si viste este mensaje me debes un beso <3",
"Te amo incluso más que a Garfield, eso es mucho"
"Aunque me lo niegues, amo tu creatividad",
"Eres el skibidi de mi toilet",
"¿estás recargando la página para ver todos los mensajes?",
"Te amo porque me haces sentir importante",
"Nunca dejas de sorprenderme, y eso me encanta",
];

const aleatorio =
mensajes[Math.floor(Math.random() * mensajes.length)];

document.getElementById("mensaje").textContent = aleatorio;
</script>

</body>
</html>
